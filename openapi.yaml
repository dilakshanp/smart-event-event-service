openapi: 3.0.0
info:
  title: Event Service API
  version: 1.0.0
  description: API for managing events, including creation, retrieval, updates, and availability checks. Supports authentication for organizer-specific actions.
servers:
  - url: http://localhost:3002
paths:
  /api/events:
    get:
      summary: Retrieve all events with optional filtering
      description: Fetches a list of events, optionally filtered by search term or date.
      parameters:
        - name: search
          in: query
          description: Search term to filter events by title (case-insensitive)
          schema:
            type: string
        - name: date
          in: query
          description: Filter events starting from this date (YYYY-MM-DD)
          schema:
            type: string
            format: date
      responses:
        "200":
          description: A list of events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      summary: Create a new event
      description: Creates a new event. Requires authentication as an organizer.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventInput"
      responses:
        "201":
          description: Event created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Event created successfully
                  event:
                    $ref: "#/components/schemas/Event"
                  reminderSent:
                    type: boolean
                    example: true
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/events/{id}:
    get:
      summary: Retrieve a single event by ID
      description: Fetches details of a specific event.
      parameters:
        - name: id
          in: path
          required: true
          description: The ID of the event
          schema:
            type: string
      responses:
        "200":
          description: Event details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
        "404":
          description: Event not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      summary: Update an existing event
      description: Updates an event. Requires authentication and must be the event's organizer.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: The ID of the event
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventInput"
      responses:
        "200":
          description: Event updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Event updated
                  event:
                    $ref: "#/components/schemas/Event"
        "403":
          description: Not authorized to update this event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Event not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      summary: Delete an event
      description: Deletes an event. Requires authentication and must be the event's organizer.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: The ID of the event
          schema:
            type: string
      responses:
        "200":
          description: Event deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Event deleted
        "403":
          description: Not authorized to delete this event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Event not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/events/{id}/availability:
    get:
      summary: Check event availability
      description: Checks the remaining capacity for an event (currently a placeholder).
      parameters:
        - name: id
          in: path
          required: true
          description: The ID of the event
          schema:
            type: string
      responses:
        "200":
          description: Availability details
          content:
            application/json:
              schema:
                type: object
                properties:
                  eventId:
                    type: string
                    example: 507f1f77bcf86cd799439011
                  remaining:
                    type: number
                    example: 100
                  capacity:
                    type: number
                    example: 100
                  message:
                    type: string
                    example: Availability checked successfully
        "404":
          description: Event not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /health:
    get:
      summary: Health check endpoint
      description: Returns the health status of the service.
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: healthy
                  service:
                    type: string
                    example: event-service
                  timestamp:
                    type: string
                    format: date-time
                    example: 2026-03-07T07:41:00.000Z
components:
  schemas:
    Event:
      type: object
      properties:
        _id:
          type: string
          example: 507f1f77bcf86cd799439011
        title:
          type: string
          example: Tech Conference
        description:
          type: string
          example: Annual tech gathering
        date:
          type: string
          format: date-time
          example: 2026-04-15T09:00:00.000Z
        location:
          type: string
          example: Colombo, Sri Lanka
        capacity:
          type: number
          example: 100
        organizerId:
          type: string
          example: user123
        createdAt:
          type: string
          format: date-time
          example: 2026-03-07T07:41:00.000Z
        updatedAt:
          type: string
          format: date-time
          example: 2026-03-07T07:41:00.000Z
    EventInput:
      type: object
      required:
        - title
        - date
        - location
        - capacity
      properties:
        title:
          type: string
          example: Tech Conference
        description:
          type: string
          example: Annual tech gathering
        date:
          type: string
          format: date-time
          example: 2026-04-15T09:00:00.000Z
        location:
          type: string
          example: Colombo, Sri Lanka
        capacity:
          type: number
          example: 100
    Error:
      type: object
      properties:
        message:
          type: string
          example: Error message
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
