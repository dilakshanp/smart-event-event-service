version: "3.9"

services:
  event-service:
    build: .
    container_name: event-service
    ports:
      - "3002:3002"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
